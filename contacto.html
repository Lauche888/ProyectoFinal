<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | MiProyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <header class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MI<span class="text-primary">PROYECTO</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </header>

    <section class="py-5 bg-light border-bottom">
        <div class="container text-center py-4">
            <h1 class="display-5 fw-bold">Hablemos de tu <span class="text-primary">idea</span></h1>
            <p class="lead text-muted">Estamos listos para llevar tu proyecto al siguiente nivel.</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-5">
                    <div class="p-4 bg-dark text-white rounded-4 shadow-lg h-100">
                        <h3 class="fw-bold mb-4">Información de Contacto</h3>
                        
                        <div class="d-flex mb-4">
                            <div class="bg-primary p-3 rounded-3 me-3">
                                <span class="text-white">📍</span>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">Ubicación</h6>
                                <p class="small text-secondary mb-0">Calle Falsa 123, Ciudad Digital</p>
                            </div>
                        </div>

                        <div class="d-flex mb-4">
                            <div class="bg-primary p-3 rounded-3 me-3">
                                <span class="text-white">📧</span>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">Email</h6>
                                <p class="small text-secondary mb-0">hola@miproyecto.com</p>
                            </div>
                        </div>

                        <div class="mt-5">
                            <img src="assets/images/hero.webp" alt="Contacto" class="img-fluid rounded-3 opacity-50">
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <form id="contactForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Nombre</label>
                                    <input type="text" class="form-control bg-light border-0 py-3" placeholder="Tu nombre">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Email</label>
                                    <input type="email" class="form-control bg-light border-0 py-3" placeholder="correo@ejemplo.com">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Asunto</label>
                                    <input type="text" class="form-control bg-light border-0 py-3" placeholder="¿En qué podemos ayudarte?">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold small">Mensaje</label>
                                    <textarea class="form-control bg-light border-0 py-3" rows="5" placeholder="Cuéntanos más..."></textarea>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow">Enviar Mensaje</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="mb-0 small opacity-50">&copy; 2024 MiProyecto - Soluciones Digitales</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
